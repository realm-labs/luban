name: release-binaries

on:
  release:
    types: [created, published, released, prereleased]
  repository_dispatch:
    types: [release-binaries]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to upload assets to. Leave blank to create v<project-version>-build.<run-number>."
        required: false

permissions:
  contents: write

jobs:
  prepare-release:
    name: Prepare release
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.release.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve release tag
        id: release
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "tag=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          elif [ -n "${{ github.event.client_payload.tag }}" ]; then
            echo "tag=${{ github.event.client_payload.tag }}" >> "$GITHUB_OUTPUT"
          elif [ -n "${{ inputs.tag }}" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            version="$(sed -n 's:.*<Version>\(.*\)</Version>.*:\1:p' ./src/Luban/Luban.csproj | head -n 1)"
            echo "tag=v${version}-build.${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"
          fi

      - name: Ensure release exists
        if: github.event_name == 'workflow_dispatch' || github.event_name == 'repository_dispatch'
        env:
          GH_TOKEN: ${{ github.token }}
        run: >
          gh release view "${{ steps.release.outputs.tag }}"
          --repo "${{ github.repository }}"
          ||
          gh release create "${{ steps.release.outputs.tag }}"
          --repo "${{ github.repository }}"
          --target "${{ github.sha }}"
          --title "${{ steps.release.outputs.tag }}"
          --notes "Automated binary release for ${{ steps.release.outputs.tag }}."

  publish:
    name: Publish self-contained ${{ matrix.rid }}
    needs: prepare-release
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - rid: win-x64
            package: luban-win-x64
            asset: luban-win-x64.zip
          - rid: linux-x64
            package: luban-linux-x64
            asset: luban-linux-x64.zip
          - rid: osx-arm64
            package: luban-osx-arm64
            asset: luban-osx-arm64.zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Publish
        run: >
          dotnet publish ./src/Luban/Luban.csproj
          --configuration Release
          --runtime ${{ matrix.rid }}
          --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:DebugType=None
          -p:DebugSymbols=false
          --output ./artifacts/publish/${{ matrix.package }}

      - name: Package
        shell: bash
        run: |
          cd "./artifacts/publish/${{ matrix.package }}"
          zip -r "../${{ matrix.asset }}" .

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: ./artifacts/publish/${{ matrix.asset }}
          if-no-files-found: error

      - name: Upload release asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: >
          gh release upload
          "${{ needs.prepare-release.outputs.tag }}"
          "./artifacts/publish/${{ matrix.asset }}"
          --repo "${{ github.repository }}"
          --clobber

  publish-framework-dependent:
    name: Publish framework-dependent
    needs: prepare-release
    runs-on: ubuntu-latest
    env:
      PACKAGE: luban-framework-dependent
      ASSET: luban-framework-dependent.zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Publish
        run: >
          dotnet publish ./src/Luban/Luban.csproj
          --configuration Release
          --self-contained false
          -p:UseAppHost=false
          -p:PublishSingleFile=false
          -p:DebugType=None
          -p:DebugSymbols=false
          --output ./artifacts/publish/$PACKAGE

      - name: Package
        shell: bash
        run: |
          cd "./artifacts/publish/$PACKAGE"
          zip -r "../$ASSET" .

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ASSET }}
          path: ./artifacts/publish/${{ env.ASSET }}
          if-no-files-found: error

      - name: Upload release asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: >
          gh release upload
          "${{ needs.prepare-release.outputs.tag }}"
          "./artifacts/publish/$ASSET"
          --repo "${{ github.repository }}"
          --clobber
